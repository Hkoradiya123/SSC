version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./ssc.db
      - SECRET_KEY=dev-secret-key
    volumes:
      - ./backend:/app
    networks:
      - ssc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ssc-network

networks:
  ssc-network:
    driver: bridge
